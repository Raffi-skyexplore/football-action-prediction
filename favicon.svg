  <polygon points="28,30 17,35 22,47 31,41" fill="#222"/>
  <polygon points="33,41 42,47 37,55 32,58 27,55 22,47 31,41" fill="#222"/>
  <!-- thin stitch lines for realism -->
  <line x1="32" y1="17" x2="32" y2="58" stroke="#fff" stroke-width="0.6" opacity="0.3"/>
  <line x1="38" y1="22" x2="26" y2="47" stroke="#fff" stroke-width="0.6" opacity="0.3"/>
  <line x1="26" y1="22" x2="38" y2="47" stroke="#fff" stroke-width="0.6" opacity="0.3"/>
